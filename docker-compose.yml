services:
  backend:
    build: ./backend
    ports:
      - "8000:10000"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/media:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    restart: always

  frontend:
    build: ./bone-fracture-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
